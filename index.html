<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Ayla — your cycle, understood</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="topbar" role="banner">
      <div class="topbar__inner">
        <div class="brand" aria-label="Ayla">
          <div class="brand__mark" aria-hidden="true">
            <svg class="ayla-logo" viewBox="0 0 48 48" role="img" focusable="false" aria-hidden="true">
              <!-- Cycle ring -->
              <path class="ayla-logo__ring" d="M13.2 24c0-6 4.8-10.8 10.8-10.8 3.7 0 7 1.8 9 4.7" />
              <path class="ayla-logo__ring ayla-logo__ring--soft" d="M34.8 24c0 6-4.8 10.8-10.8 10.8-3.7 0-7-1.8-9-4.7" />

              <!-- Crescent -->
              <path class="ayla-logo__crescent" d="M29.6 17.1a8.4 8.4 0 1 0 0 13.8 7.1 7.1 0 1 1 0-13.8Z" />

              <!-- Petal -->
              <path class="ayla-logo__petal" d="M18.2 27.2c.7-2.9 2.8-5.1 6.2-6.5-.2 3.7-1.6 6.2-4.4 7.8-1.1.6-2.4.9-3.9.9.8-.6 1.4-1.3 2.1-2.2Z" />

              <!-- Gentle wave -->
              <path class="ayla-logo__wave" d="M16.2 30.3c2.5-3.5 5.3-5.1 7.9-5.1 2.7 0 4.6 1.8 7.4 1.8 1.7 0 3.2-.6 4.6-1.8" />

              <!-- Spark -->
              <path class="ayla-logo__spark" d="M35.8 14.6l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9.9-2.6Z" />
            </svg>
          </div>
          <div class="brand__text">
            <div class="brand__name">Ayla</div>
            <div class="brand__tagline">your cycle, understood</div>
          </div>
        </div>

        <div class="topbar__actions">
          <button class="btn btn--ghost" id="themeBtn" type="button">Theme</button>
        </div>
      </div>
    </header>

    <main id="main" class="app" role="main">
      <!-- AUTH -->
      <section class="auth" id="authScreen" aria-label="Authentication">
        <div class="auth__card">
          <div class="auth__header">
            <h1 class="h1">Welcome back</h1>
            <p class="subtle">
              A calm, private space to understand your cycle — built to be used daily.
            </p>
          </div>

          <div class="segmented" role="tablist" aria-label="Sign in or sign up">
            <button class="segmented__btn is-active" id="tabLogin" role="tab" aria-selected="true" type="button">
              Log in
            </button>
            <button class="segmented__btn" id="tabSignup" role="tab" aria-selected="false" type="button">
              Sign up
            </button>
          </div>

          <form class="form" id="authForm" autocomplete="on" novalidate>
            <label class="field hidden" id="fullNameField" hidden>
              <span class="field__label">Full Name</span>
              <input
                class="field__input"
                id="fullName"
                name="fullName"
                inputmode="text"
                autocomplete="name"
                placeholder="Enter your full name (e.g., Ritika Sharma)"
              />
              <p class="micro error field__error" id="fullNameError" role="status" aria-live="polite" hidden></p>
            </label>

            <label class="field" id="usernameField">
              <span class="field__label">Username</span>
              <input
                class="field__input"
                id="username"
                name="username"
                inputmode="text"
                autocomplete="username"
                placeholder="Choose a unique username (min 3 characters)"
              />
              <p class="micro error field__error" id="usernameError" role="status" aria-live="polite" hidden></p>
            </label>

            <label class="field" id="passwordField">
              <span class="field__label">Password</span>
              <input
                class="field__input"
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Create a password (min 4 characters)"
              />
              <p class="micro error field__error" id="passwordError" role="status" aria-live="polite" hidden></p>
            </label>

            <div class="auth__meta">
              <p class="micro subtle" id="authHint">
                Tip: This app stores your data only on this device (localStorage).
              </p>
              <p class="micro success" id="authSuccess" role="status" aria-live="polite" hidden></p>
              <p class="micro error" id="authError" role="status" aria-live="polite" hidden></p>
            </div>

            <button class="btn btn--primary btn--block" id="authSubmit" type="submit">
              Log in
            </button>
          </form>
        </div>
      </section>
    </main>

    <dialog class="modal theme-modal" id="themeModal" aria-label="Choose theme">
      <form method="dialog" class="modal__card modal__card--tight">
        <div class="modal__head">
          <div>
            <div class="micro subtle">Personalization</div>
            <div class="h3">Theme</div>
          </div>
          <button class="icon-btn" value="cancel" aria-label="Close" type="submit"><span aria-hidden="true">×</span></button>
        </div>
        <div class="modal__body">
          <div class="scroll-area scroll-fade theme-scroll" id="themeScroll" aria-label="Theme options">
            <div class="theme-list" id="themeList"></div>
          </div>
          <p class="micro subtle">Your preference stays on this device.</p>
        </div>
        <div class="modal__foot">
          <div class="spacer"></div>
          <button class="btn btn--primary" value="default" type="submit">Done</button>
        </div>
      </form>
    </dialog>

    <script src="./theme.js" defer></script>
    <script src="./auth.js" defer></script>
  </body>
</html>
