<!doctype html>
<html lang="en" class="auth-html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#462738" />
    <title>Ayla — your cycle, understood</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/ayla-app-icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page--auth">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="topbar topbar--auth" role="banner">
      <div class="topbar__inner topbar__inner--auth">
        <div class="brand" aria-label="Ayla">
          <div class="brand__mark" aria-hidden="true">
            <svg class="ayla-logo" viewBox="0 0 48 48" role="img" focusable="false" aria-hidden="true">
              <circle class="ayla-logo__rhythm" cx="24" cy="24" r="18.4" fill="none" transform="rotate(-18 24 24)" />
              <g class="ayla-logo__bloom">
                <path
                  class="ayla-logo__petal"
                  d="M24 10.4C15.3 12.3 10.8 19.1 11.5 25.8C12.1 30.8 16.8 34.6 24 35.8C31.2 34.6 35.9 30.8 36.5 25.8C37.2 19.1 32.7 12.3 24 10.4Z"
                />
                <path
                  class="ayla-logo__petal"
                  d="M24 10.4C15.3 12.3 10.8 19.1 11.5 25.8C12.1 30.8 16.8 34.6 24 35.8C31.2 34.6 35.9 30.8 36.5 25.8C37.2 19.1 32.7 12.3 24 10.4Z"
                  transform="rotate(120 24 24)"
                />
                <path
                  class="ayla-logo__petal"
                  d="M24 10.4C15.3 12.3 10.8 19.1 11.5 25.8C12.1 30.8 16.8 34.6 24 35.8C31.2 34.6 35.9 30.8 36.5 25.8C37.2 19.1 32.7 12.3 24 10.4Z"
                  transform="rotate(240 24 24)"
                />
              </g>
              <circle class="ayla-logo__core" cx="24" cy="24" r="3.6" />
            </svg>
          </div>
          <div class="brand__text">
            <div class="brand__name">Ayla</div>
            <div class="brand__tagline">your cycle, understood</div>
          </div>
        </div>
      </div>
    </header>

    <main id="main" class="app" role="main">
      <section class="auth" id="authScreen" aria-label="Authentication">
        <div class="auth__card">
          <div class="auth__header">
            <h1 class="h1" id="authHeading">Welcome back</h1>
            <p class="subtle" id="authSubtle">
              Sign in to your private space — calm, secure, and yours alone.
            </p>
          </div>

          <div class="auth__tabs">
            <div class="segmented" role="tablist" aria-label="Account access">
              <button type="button" class="segmented__btn is-active" id="tabLogin" role="tab" aria-selected="true">
                Log in
              </button>
              <button type="button" class="segmented__btn" id="tabSignup" role="tab" aria-selected="false">
                Sign up
              </button>
            </div>
          </div>

          <form class="form" id="authForm" autocomplete="on" novalidate>
            <label class="field" id="preferredNameField" hidden>
              <span class="field__label">Your Name</span>
              <input
                class="field__input"
                id="preferredName"
                name="preferredName"
                type="text"
                autocomplete="name"
                autocapitalize="words"
                spellcheck="true"
                maxlength="80"
                placeholder="What should we call you?"
              />
              <p class="micro error field__error" id="preferredNameError" role="status" aria-live="polite" hidden></p>
            </label>

            <label class="field">
              <span class="field__label">Email Address</span>
              <input
                class="field__input"
                id="email"
                name="email"
                type="email"
                inputmode="email"
                autocomplete="email"
                autocapitalize="none"
                spellcheck="false"
                placeholder="Enter your email"
              />
              <p class="micro error field__error" id="emailError" role="status" aria-live="polite" hidden></p>
            </label>

            <label class="field">
              <span class="field__label">Password</span>
              <span class="field__control">
                <input
                  class="field__input field__input--withIcon"
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="Enter your password"
                />
                <button
                  class="field__iconBtn"
                  id="passwordToggle"
                  type="button"
                  aria-label="Show password"
                  aria-pressed="false"
                >
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path
                      d="M12 5c5.7 0 10 5.6 10 7s-4.3 7-10 7S2 14.4 2 12s4.3-7 10-7Zm0 2C7.7 7 4.2 11 4.2 12S7.7 17 12 17s7.8-4 7.8-5S16.3 7 12 7Zm0 2.2A2.8 2.8 0 1 1 12 14.8a2.8 2.8 0 0 1 0-5.6Z"
                    />
                  </svg>
                </button>
              </span>
              <p class="micro error field__error" id="passwordError" role="status" aria-live="polite" hidden></p>
            </label>

            <label class="field" id="confirmPasswordField" hidden>
              <span class="field__label">Confirm password</span>
              <span class="field__control">
                <input
                  class="field__input field__input--withIcon"
                  id="confirmPassword"
                  name="confirmPassword"
                  type="password"
                  autocomplete="new-password"
                  placeholder="Confirm your password"
                />
                <button
                  class="field__iconBtn"
                  id="confirmPasswordToggle"
                  type="button"
                  aria-label="Show confirm password"
                  aria-pressed="false"
                >
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path
                      d="M12 5c5.7 0 10 5.6 10 7s-4.3 7-10 7S2 14.4 2 12s4.3-7 10-7Zm0 2C7.7 7 4.2 11 4.2 12S7.7 17 12 17s7.8-4 7.8-5S16.3 7 12 7Zm0 2.2A2.8 2.8 0 1 1 12 14.8a2.8 2.8 0 0 1 0-5.6Z"
                    />
                  </svg>
                </button>
              </span>
              <p class="micro error field__error" id="confirmPasswordError" role="status" aria-live="polite" hidden></p>
            </label>

            <div class="auth__forgotRow" id="forgotRow">
              <button class="text-link" id="forgotPasswordLink" type="button">Forgot password?</button>
            </div>

            <div class="auth__meta">
              <p class="micro subtle" id="authHint">
                Private by design — your cycle data stays on this device until you choose otherwise.
              </p>
              <p class="micro success" id="authSuccess" role="status" aria-live="polite" hidden></p>
              <p class="micro error" id="authError" role="status" aria-live="polite" hidden></p>
            </div>

            <div class="auth__submit">
              <button class="btn btn--primary btn--block auth__primaryBtn" id="authSubmit" type="submit">Log in</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <dialog class="modal recover-modal" id="recoverModal" aria-label="Recover your account">
      <form method="dialog" class="modal__card">
        <div class="modal__head">
          <div>
            <div class="micro subtle" id="recoverKicker">Account recovery</div>
            <div class="h3" id="recoverTitle">Recover your account</div>
            <p class="micro subtle" id="recoverSubtitle">Enter your email to verify your identity.</p>
          </div>
          <button class="icon-btn" value="cancel" aria-label="Close recovery" type="submit">
            <span aria-hidden="true">×</span>
          </button>
        </div>

        <div class="modal__body" id="recoverBody"></div>

        <div class="modal__foot" id="recoverFoot"></div>
      </form>
    </dialog>

    <script src="./auth.js" defer></script>
  </body>
</html>
